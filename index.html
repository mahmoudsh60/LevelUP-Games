    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e24;
            --primary-color: #00ffcc;
            --primary-hover: #00ccaa;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --danger: #ff4757;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }

        header {
            background-color: #0d0d0d;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        header span {
            color: var(--primary-color);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 15px;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: var(--card-bg);
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
        }

        .search-box button {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            font-weight: bold;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            font-size: 15px;
        }

        .filter-section {
            margin-bottom: 15px;
        }
        
        .filter-title {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .filter-btn {
            background-color: #2a2a35;
            color: var(--text-main);
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            transition: 0.2s;
        }

        .filter-btn.active {
            background-color: var(--primary-color);
            color: #000;
            border-color: var(--primary-color);
            font-weight: bold;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }

        .card-header {
            background-color: #17171c;
            padding: 12px 10px;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        .game-title {
            color: var(--primary-color);
            font-size: 15px;
            font-weight: 700;
            margin: 0;
            line-height: 1.4;
        }

        .card-content {
            padding: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .tags {
            margin-bottom: 8px;
            text-align: center;
        }

        .tag {
            display: inline-block;
            background-color: #333;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
            margin: 2px;
            color: var(--primary-color);
        }

        .info-text {
            font-size: 13px;
            color: #ddd;
            margin-bottom: 5px;
            text-align: center;
        }

        .card-actions {
            margin-top: auto;
            padding-top: 10px;
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 13px;
        }

        .btn-add {
            background-color: var(--primary-color);
            color: #000;
        }

        .btn-add.added {
            background-color: var(--danger);
            color: white;
        }

        .btn-yt {
            background-color: #d32f2f;
            color: white;
        }

        .cart-float {
            position: fixed;
            bottom: 15px;
            left: 15px;
            background-color: var(--primary-color);
            color: #000;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            box-shadow: 0 4px 10px rgba(0, 255, 204, 0.3);
            cursor: pointer;
            border: none;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1001;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .cart-content {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 10px;
            padding: 15px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--primary-color);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            border-bottom: 1px dashed #333;
            padding-bottom: 5px;
        }

        .cart-summary {
            background-color: #2a2a35;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            text-align: center;
        }

        .cart-summary h3 {
            margin: 0 0 8px 0;
            color: var(--primary-color);
            font-size: 15px;
        }

        .whatsapp-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-whatsapp:hover {
            background-color: #128C7E;
        }
        
        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }
    </style>
</head>

        let cart = [];
        let activeGenres = [];
        let activePlayers = [];

        function toggleFilter(type, value, btnElement) {
            btnElement.classList.toggle('active');
            
            if(type === 'genre') {
                if(activeGenres.includes(value)) activeGenres = activeGenres.filter(g => g !== value);
                else activeGenres.push(value);
            } else if (type === 'players') {
                if(activePlayers.includes(value)) activePlayers = activePlayers.filter(p => p !== value);
                else activePlayers.push(value);
            }
            renderGames();
        }

        function handleEnter(e) {
            if(e.key === 'Enter') renderGames();
        }

        function toggleCart(id) {
            const game = gamesDB.find(g => g.id === id);
            const index = cart.findIndex(g => g.id === id);
            
            if(index > -1) {
                cart.splice(index, 1);
            } else {
                cart.push(game);
            }
            
            updateCartUI();
            renderGames();
        }

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';

            gamesDB.forEach(game => {
                if (searchText && !game.name.toLowerCase().includes(searchText)) return;

                if (activeGenres.length > 0) {
                    const matchGenre = game.genres.some(g => activeGenres.includes(g));
                    if (!matchGenre) return;
                }

                if (activePlayers.length > 0) {
                    const matchPlayer = activePlayers.some(p => game.maxPlayers >= p);
                    if (!matchPlayer) return;
                }

                const inCart = cart.some(c => c.id === game.id);
                const ytLink = `https://www.youtube.com/results?search_query=${encodeURIComponent(game.name + " review")}`;
                
                let tagsHTML = game.genres.map(g => `<span class="tag">${g}</span>`).join('');

                const cardHTML = `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="game-title">${game.name}</h3>
                        </div>
                        <div class="card-content">
                            <div class="tags">${tagsHTML}</div>
                            <div class="info-text">🎮 اللاعبين: ${game.playersTxt}</div>
                            <div class="info-text">💾 المساحة: ${game.minSize} - ${game.maxSize} GB</div>
                            
                            <div class="card-actions">
                                <button class="btn ${inCart ? 'btn-add added' : 'btn-add'}" onclick="toggleCart(${game.id})">
                                    ${inCart ? '❌ إزالة' : '➕ إضافة'}
                                </button>
                                <a href="${ytLink}" target="_blank" class="btn btn-yt">▶ مراجعة</a>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            
            const list = document.getElementById('cartItemsList');
            list.innerHTML = '';
            
            let minTotal = 0;
            let maxTotal = 0;

            if(cart.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#aaa;">السلة فارغة حالياً</p>';
            }

            cart.forEach(game => {
                minTotal += game.minSize;
                maxTotal += game.maxSize;
                list.innerHTML += `
                    <div class="cart-item">
                        <span>${game.name}</span>
                        <span style="color:var(--primary-color);" dir="ltr">${game.minSize}-${game.maxSize} GB</span>
                    </div>
                `;
            });

            document.getElementById('minSize').innerText = minTotal;
            document.getElementById('maxSize').innerText = maxTotal;
        }

        function openCart() { document.getElementById('cartModal').style.display = 'flex'; }
        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

        function sendWhatsApp(phone) {
            if(cart.length === 0) {
                alert("يرجى اختيار ألعاب أولاً!");
                return;
            }

            let minTotal = 0;
            let maxTotal = 0;
            
            let text = "مرحباً LevelUP،\n أود تثبيت هذه الألعاب على جهازي\n";
            cart.forEach((game, index) => {
                text += ` ${index + 1}. ${game.name} (${game.minSize}-${game.maxSize} GB)\n`;
                minTotal += game.minSize;
                maxTotal += game.maxSize;
            });

            text += ` إجمالي المساحة المطلوبة: من ${minTotal} إلى ${maxTotal} جيجابايت.`;

            const encodedText = encodeURIComponent(text);
            const whatsappUrl = `https://wa.me/${phone}?text=${encodedText}`;
            window.open(whatsappUrl, '_blank');
        }

        renderGames();
        updateCartUI();
    </script>
