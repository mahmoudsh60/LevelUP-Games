<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LevelUP Mod Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e24;
            --primary-color: #00ffcc;
            --primary-hover: #00ccaa;
            --accent-color: #ffcc00;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --danger: #ff4757;
            --danger-hover: #e03e4d;
            --fb-color: #1877F2;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }

        .top-info-bar {
            background-color: #000;
            color: var(--primary-color);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            border-bottom: 1px solid #333;
        }

        .top-info-bar a { color: var(--primary-color); text-decoration: none; font-weight: bold; }

        header {
            background-color: #0d0d0d;
            padding: 20px 15px;
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 1px; }
        header span { color: var(--primary-color); }

        .fb-link {
            display: inline-block;
            margin-top: 10px;
            background-color: var(--fb-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            font-weight: bold;
        }

        .container { max-width: 1200px; margin: auto; padding: 15px; }

        /* ======== تصميم الباقات ======== */
        .packages-section { margin-bottom: 40px; }
        
        .section-title {
            text-align: center; font-size: 24px; color: var(--primary-color);
            margin-bottom: 20px; font-weight: 900;
        }

        .packages-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px;
        }

        .pkg-card {
            background-color: #1a1a20; border: 2px solid #333; border-radius: 12px;
            padding: 20px; text-align: center; transition: 0.3s; display: flex; flex-direction: column;
        }

        .pkg-card:hover { border-color: var(--primary-color); transform: translateY(-5px); }
        .pkg-card.premium { border-color: #7000ff; }
        .pkg-card.mega { border-color: var(--accent-color); }

        .pkg-title { font-size: 22px; font-weight: bold; color: var(--primary-color); margin-bottom: 10px; }
        .pkg-card.premium .pkg-title { color: #b785ff; }
        .pkg-card.mega .pkg-title { color: var(--accent-color); }

        .pkg-size {
            background-color: #000; display: inline-block; padding: 5px 15px;
            border-radius: 20px; font-size: 16px; font-weight: bold; margin-bottom: 15px; border: 1px solid #444;
        }

        .pkg-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; flex-grow: 1; }

        .btn-pkg {
            background-color: var(--primary-color); color: #000; border: none; padding: 12px;
            border-radius: 8px; font-weight: bold; font-family: 'Tajawal', sans-serif; font-size: 15px; cursor: pointer; width: 100%;
        }
        .pkg-card.premium .btn-pkg { background-color: #7000ff; color: white; }
        .pkg-card.mega .btn-pkg { background-color: var(--accent-color); color: #000; }

        .divider {
            height: 3px; background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            margin: 40px 0; border-radius: 5px;
        }

        /* ======== البحث والفلترة ======== */
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-box input {
            flex: 1; padding: 10px 12px; border-radius: 6px; border: 1px solid #444;
            background-color: var(--card-bg); color: white; font-family: 'Tajawal', sans-serif; font-size: 15px;
        }
        .search-box button {
            background-color: var(--primary-color); color: #000; border: none; padding: 0 15px;
            border-radius: 6px; font-weight: bold; font-family: 'Tajawal', sans-serif; cursor: pointer; font-size: 15px;
        }

        .filter-section { margin-bottom: 25px; background: #1a1a20; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .filter-title { font-size: 14px; color: var(--primary-color); margin-bottom: 10px; font-weight: bold; }
        .filter-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .filter-group:last-child { margin-bottom: 0; }
        .filter-btn {
            background-color: #2a2a35; color: var(--text-main); border: 1px solid #444;
            padding: 6px 12px; border-radius: 15px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 13px; transition: 0.2s;
        }
        .filter-btn.active { background-color: var(--primary-color); color: #000; border-color: var(--primary-color); font-weight: bold; }

        /* ======== كروت الألعاب ======== */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
        .card { background-color: var(--card-bg); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.4); display: flex; flex-direction: column; border: 1px solid #333; }
        .card-header { background-color: #17171c; padding: 12px 10px; border-bottom: 1px solid #333; text-align: center; }
        .game-title { color: var(--primary-color); font-size: 15px; font-weight: 700; margin: 0; line-height: 1.4; }
        .card-content { padding: 10px; flex: 1; display: flex; flex-direction: column; }
        .tags { margin-bottom: 8px; text-align: center; }
